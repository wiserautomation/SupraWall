name: 🚀 Dify Plugin Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/dify-plugin/suprawall-security/**'

jobs:
  publish:
    name: "🚀 Build & PR to Marketplace"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🛠️ Set environment variables
        run: |
          echo "VERSION=$(grep '^version:' packages/dify-plugin/suprawall-security/manifest.yaml | awk '{print $2}')" >> $GITHUB_ENV
          echo "PLUGIN_NAME=suprawall-security" >> $GITHUB_ENV

      - name: ⬇️ Download Dify CLI
        run: |
          wget https://github.com/langgenius/dify-plugin-daemon/releases/latest/download/dify-plugin-linux-amd64
          chmod +x dify-plugin-linux-amd64

      - name: 📦 Package .difypkg
        run: |
          cd packages/dify-plugin/suprawall-security
          ../../../dify-plugin-linux-amd64 plugin package . -o "${{ env.PLUGIN_NAME }}-${{ env.VERSION }}.difypkg"

      - name: 🔀 Fork & Create PR to Marketplace
        env:
          GH_TOKEN: ${{ secrets.GH_MARKETPLACE_TOKEN }}
        run: |
          # 1. Setup git
          git config --global user.name "SupraWall Automation"
          git config --global user.email "bot@supra-wall.com"

          # 2. Fork the target repo into 'suprawall' org (requires token permission)
          gh repo fork langgenius/dify-plugins --org suprawall --remote=true

          # 3. Clone the fork
          git clone https://github.com/suprawall/dify-plugins.git marketplace-repo
          cd marketplace-repo
          git checkout -b "bump-${{ env.PLUGIN_NAME }}-${{ env.VERSION }}"

          # 4. Copy the package
          mkdir -p "suprawall/${{ env.PLUGIN_NAME }}"
          cp "../packages/dify-plugin/suprawall-security/${{ env.PLUGIN_NAME }}-${{ env.VERSION }}.difypkg" "suprawall/${{ env.PLUGIN_NAME }}/"

          # 5. Commit and push
          git add .
          git commit -m "feat: add SupraWall Security plugin v${{ env.VERSION }}"
          git push origin "bump-${{ env.PLUGIN_NAME }}-${{ env.VERSION }}"

          # 6. Open PR via gh cli
          gh pr create \
            --repo langgenius/dify-plugins \
            --title "Add SupraWall Security plugin v${{ env.VERSION }}" \
            --body "Adds the official SupraWall Security plugin ($VERSION). Deterministic policy enforcement for AI agents." \
            --base main \
            --head "suprawall:bump-${{ env.PLUGIN_NAME }}-${{ env.VERSION }}"
