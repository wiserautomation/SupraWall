name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/dashboard
        run: npm install --legacy-peer-deps

      - name: Build dashboard
        working-directory: packages/dashboard
        run: npm run build

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/sdk-ts
        run: npm install --legacy-peer-deps

      - name: Build TypeScript SDK
        working-directory: packages/sdk-ts
        run: npm run build

      - name: Run tests
        working-directory: packages/sdk-ts
        run: npm test

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python SDK
        run: |
          cd packages/sdk-python
          pip install -e ".[dev]"

      - name: Run Python tests
        run: |
          cd packages/sdk-python
          python -m pytest tests/ -v

  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.21'

      - name: Build Go SDK
        run: |
          cd packages/sdk-go
          go build ./...

      - name: Test Go SDK
        run: |
          cd packages/sdk-go
          go test ./...

  health-smoke-test:
    name: Production Health Smoke Test
    runs-on: ubuntu-latest
    # Only runs on main — skipped on PRs to avoid false positives during feature branches.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Requires these secrets to be set in GitHub repository settings:
    #   SUPRAWALL_ADMIN_TOKEN — a valid Firebase ID token for an ADMIN_EMAILS address
    #   NEXT_PUBLIC_APP_URL   — https://supra-wall.com (or staging URL)
    #
    # To add: Settings → Secrets and variables → Actions → New repository secret
    needs: [dashboard]

    steps:
      - name: Check /api/admin/health — no configured source may be unreachable
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          ADMIN_TOKEN: ${{ secrets.SUPRAWALL_ADMIN_TOKEN }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$ADMIN_TOKEN" ]; then
            echo "::warning::NEXT_PUBLIC_APP_URL or SUPRAWALL_ADMIN_TOKEN secret not set — skipping smoke test."
            exit 0
          fi

          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/admin/health")

          if [ $? -ne 0 ]; then
            echo "::error::/api/admin/health returned a non-200 status. Deployment may be broken."
            exit 1
          fi

          # Fail if any source is configured but unreachable (credential rot).
          FAILURES=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          sources = data.get('sources', {})
          bad = [
            name for name, s in sources.items()
            if s.get('configured') and not s.get('reachable')
          ]
          if bad:
            print('Configured but unreachable: ' + ', '.join(bad))
            sys.exit(1)
          ")

          if [ $? -ne 0 ]; then
            echo "::error::$FAILURES"
            exit 1
          fi

          echo "All configured data sources are reachable."
