name: Sync Action to Public Repo

on:
  workflow_dispatch: # Allow manual trigger only per user policy

jobs:
  sync:
    name: Build and Sync to Public Repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: private-repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: private-repo/package-lock.json

      - name: Install dependencies
        run: |
          cd private-repo
          npm ci

      - name: Build Action
        run: |
          cd private-repo/packages/github-action
          npm run build

      - name: Verify build output
        run: |
          if [ ! -f private-repo/packages/github-action/dist/index.js ]; then
            echo "ERROR: dist/index.js was not generated. Check the build step."
            exit 1
          fi
          echo "Build successful. dist/index.js size: $(wc -c < private-repo/packages/github-action/dist/index.js) bytes"

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: wiserautomation/SupraWall
          token: ${{ secrets.SUPRAWALL_PUBLIC_REPO_TOKEN }}
          path: public-repo

      - name: Sync files to public repo
        run: |
          # Clean public repo except for .git
          cd public-repo
          find . -maxdepth 1 -not -name '.git' -not -name '.' -delete
          
          # Copy files from private repo
          cp ../private-repo/packages/github-action/action.yml .
          cp -r ../private-repo/packages/github-action/dist .
          cp ../private-repo/LICENSE .
          
          # Use dedicated README if available
          if [ -f ../private-repo/packages/github-action/README_ACTION.md ]; then
            cp ../private-repo/packages/github-action/README_ACTION.md README.md
          else
            cp ../private-repo/README.md .
          fi

      - name: Commit and push to public repo
        run: |
          cd public-repo
          git config user.name "SupraWall Automation"
          git config user.email "bot@supra-wall.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to sync."
          else
            git commit -m "chore: sync action from private repo"
            git remote set-url origin https://x-access-token:${{ secrets.SUPRAWALL_PUBLIC_REPO_TOKEN }}@github.com/wiserautomation/SupraWall.git
            git push origin main --force
          fi
