version: '3.8'

services:
  suprawall-server:
    build: .
    image: suprawall/server:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:DB_PASSWORD_REDACTED@postgres:5432/suprawall
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=DB_PASSWORD_REDACTED
      - POSTGRES_DB=suprawall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
