    they reach production. Integrates directly into your Dify Workflow or Agent.
icon: icon.svg
category: tool
tags:
  - security
  - productivity
  - utilities
resource:
  memory: 256mb
  permission:
    endpoints:
      enabled: true
    tools:
      enabled: true
    models:
      enabled: false
