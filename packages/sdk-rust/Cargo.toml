[package]
name = "suprawall"
version = "0.1.0"
edition = "2021"
authors = ["SupraWall Contributors"]
description = "Fast, lightweight Rust SDK for SupraWall. Policy enforcement for AI agents."
license = "Apache-2.0"
repository = "https://github.com/wiserautomation/SupraWall"

[dependencies]
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
