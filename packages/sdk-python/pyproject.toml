[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "suprawall-sdk"
version = "1.1.1"
description = "The open-source core for AI agent security and compliance"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "SupraWall Contributors" }]
keywords = ["ai", "agents", "security", "mcp", "langchain", "openai", "gateway", "policy"]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
openai    = ["openai-agents>=0.0.3"]
dev       = ["pytest>=7.0.0"]
all       = ["openai-agents>=0.0.3", "pytest>=7.0.0"]

[project.urls]
Homepage      = "https://supra-wall.com"
Repository    = "https://github.com/suprawall/suprawall"
"Bug Tracker" = "https://github.com/suprawall/suprawall/issues"

[tool.hatch.build.targets.wheel]
packages = ["suprawall"]

[tool.hatch.build.targets.sdist]
exclude = ["venv", "tests", ".env"]
