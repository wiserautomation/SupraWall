[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "suprawall-warp-adapter"
version = "0.1.0"
description = "SupraWall reference adapter for Warp's warp.agent_policy_hook.v1"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "SupraWall Contributors" }]
keywords = ["warp", "agent", "policy", "security", "suprawall"]
dependencies = [
    "suprawall-sdk>=1.1.1",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
]

[project.scripts]
suprawall-warp = "suprawall_warp.__main__:main"

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "pytest-subprocess>=1.5.0"]

[project.urls]
Homepage  = "https://supra-wall.com"
Repository = "https://github.com/wiserautomation/SupraWall"

[tool.hatch.build.targets.wheel]
packages = ["src/suprawall_warp"]

[tool.hatch.build.targets.sdist]
exclude = ["venv", "tests", ".env"]
