<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #111111;
            border: 1px solid #1A1A1A;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            padding: 40px 40px 20px 40px;
            text-align: left;
        }
        .logo {
            color: #B8FF00;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        .content {
            padding: 20px 40px;
            line-height: 1.6;
            color: #E0E0E0;
        }
        .footer {
            padding: 40px;
            background-color: #000000;
            border-top: 1px solid #1A1A1A;
            color: #666666;
            font-size: 12px;
            text-align: left;
        }
        h1 {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }
        p {
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #B8FF00;
            color: #000000;
            padding: 14px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin: 20px 0;
        }
        .btn-secondary {
            background-color: transparent;
            color: #B8FF00;
            border: 1px solid #B8FF00;
        }
        .btn-danger {
            background-color: transparent;
            color: #FF4B4B;
            border: 1px solid #FF4B4B;
        }
        .code-block {
            background-color: #000000;
            border: 1px solid #1A1A1A;
            border-radius: 6px;
            padding: 20px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            color: #B8FF00;
            margin: 20px 0;
            overflow-x: auto;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .badge-allow { background-color: rgba(184, 255, 0, 0.1); color: #B8FF00; border: 1px solid #B8FF00; }
        .badge-deny { background-color: rgba(255, 75, 75, 0.1); color: #FF4B4B; border: 1px solid #FF4B4B; }
        .badge-warn { background-color: rgba(255, 171, 0, 0.1); color: #FFAB00; border: 1px solid #FFAB00; }
        
        .divider {
            height: 1px;
            background-color: #1A1A1A;
            margin: 30px 0;
        }
        
        @media only screen and (max-width: 600px) {
            .container {
                margin: 0;
                border: none;
                border-radius: 0;
            }
            .header, .content, .footer {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SUPRAWALL</div>
        </div>
        
        <div class="content">
            {{content}}
        </div>
        
        <div class="footer">
            <p><strong>Suprawall</strong> — Enterprise AI Agent Security & Runtime Guardrails</p>
            <p>&copy; 2026 SupraWall Contributors. All rights reserved.</p>
            <p>You are receiving this because you signed up for SupraWall. <a href="{{unsubscribe_url}}" style="color: #666666; text-decoration: underline;">Unsubscribe</a></p>
        </div>
    </div>
</body>
</html>
