name: 'SupraWall Security Scan'
description: 'Deterministic security layer for AI agents. Detects credential leaks, prompt injections, and policy violations in CI/CD pipelines.'
author: 'SupraWall'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'SupraWall API key (get one at supra-wall.com/signup)'
    required: true
  policy-file:
    description: 'Path to your suprawall.config.json policy config'
    required: false
    default: 'suprawall.config.json'
  fail-on:
    description: 'Minimum severity level to fail the build: critical | high | medium | low'
    required: false
    default: 'high'
  agent-path:
    description: 'Directory containing agent code to scan'
    required: false
    default: '.'

outputs:
  violations:
    description: 'Number of policy violations found'
  report-url:
    description: 'Link to the full Suprawall scan report'

runs:
  using: 'node20'
  main: 'dist/index.js'
